mist:
  name: Mist
  description: Mist for a specific duration in seconds, then auto-stop. Idempotent if already misting.
  fields:
    duration:
      name: Duration
      description: How long to mist, in seconds (1-120).
      required: true
      example: 15
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: seconds
          mode: slider

stop:
  name: Stop
  description: Stop the currently active mist or pulse program immediately. Same firmware signal as the physical STOP button. Does NOT day-block subsequent sprays (the integration uses stop_send routinely after every auto-stop without disabling further mists). The separate stopday_send action (not exposed here) is what blocks for the rest of the day.

refresh:
  name: Refresh settings
  description: Force re-handshake with the device to pull fresh settings (G_imp).

disable_all_cycles:
  name: Disable all on-device cycles
  description: Push a full settings frame with every cycle's `act` flag set to 0. Use this to stop the device's onboard scheduler firing programs autonomously, so HA becomes the sole source of truth. The current settings are cached and can be restored with restore_cycles.

restore_cycles:
  name: Restore on-device cycles
  description: Restore the cached original cycle settings (act flags as observed when the integration first connected). Reverse of disable_all_cycles.

log_cycles:
  name: Log on-device cycles (diagnostic)
  description: Emit a WARNING-level log line for every cycle (C1..C6, CS, CE, CJ) in both the cached original settings and the current settings, so you can identify which slots had act=1 before disable_all_cycles was called. Reads via system_log/list.

set_cs_duration:
  name: Set CS pulse-session duration
  description: Modify the CS (Start cycle) end_hour and end_minute so the next pulse_send runs for the given duration. CS is the device's on-board "Start button" cycle template — pressing pulse_send launches a pulse program for CS's duration (10s mist every 5min). Set once and leave; doesn't fire anything by itself.
  fields:
    minutes:
      name: Duration (minutes)
      description: How long the next pulse_send session should run. Typical values 30-90.
      required: true
      example: 60
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: minutes
          mode: slider
          step: 1
